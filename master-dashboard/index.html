<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iVA Master Control — Licensing Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f1a;
      --card: #161c2d;
      --border: rgba(255,255,255,0.08);
      --primary: #6366f1;
      --primary-glow: rgba(99,102,241,0.3);
      --success: #10b981;
      --danger: #ef4444;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Outfit', sans-serif; 
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── AUTH SCREEN ── */
    #auth-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .auth-card {
      background: var(--card); padding: 40px; border-radius: 24px;
      border: 1px solid var(--border); width: 100%; max-width: 400px;
      text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .auth-icon { font-size: 48px; margin-bottom: 20px; }
    .auth-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .auth-desc { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
    input {
      width: 100%; padding: 14px 18px; background: rgba(0,0,0,0.2);
      border: 1px solid var(--border); border-radius: 12px; color: white;
      font-size: 16px; margin-bottom: 16px; outline: none; transition: 0.2s;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
    button.btn-primary {
      width: 100%; padding: 14px; background: var(--primary);
      color: white; border: none; border-radius: 12px; font-weight: 700;
      cursor: pointer; transition: 0.2s;
    }
    button.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px var(--primary-glow); }

    /* ── MAIN DASHBOARD ── */
    #app { padding: 40px 20px; max-width: 1000px; margin: 0 auto; display: none; }
    
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
    .brand { display: flex; align-items: center; gap: 15px; }
    .logo-circle {
      width: 45px; height: 45px; background: var(--primary); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px;
    }
    .brand-text h1 { font-size: 20px; font-weight: 800; }
    .brand-text p { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card {
      background: var(--card); padding: 24px; border-radius: 20px; border: 1px solid var(--border);
    }
    .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 800; }

    .controls { display: flex; gap: 15px; margin-bottom: 24px; }
    .search-box { flex: 1; position: relative; }
    .search-box input { margin-bottom: 0; padding-left: 45px; }
    .search-icon { position: absolute; left: 18px; top: 15px; color: var(--text-dim); }

    .license-list { display: flex; flexDirection: column; gap: 12px; }
    .license-card {
      background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; transition: 0.2s;
    }
    .license-card:hover { border-color: rgba(255,255,255,0.15); transform: translateX(4px); }
    
    .info { display: flex; flex-direction: column; gap: 4px; }
    .shop-name { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .hwid { font-family: monospace; font-size: 11px; color: var(--text-dim); background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px; }
    .meta { font-size: 12px; color: var(--text-dim); }

    .status-badge {
      padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase;
    }
    .status-active { background: rgba(16,185,129,0.1); color: var(--success); }
    .status-pending { background: rgba(245,158,11,0.1); color: #f59e0b; }

    .actions { display: flex; gap: 8px; }
    .btn-action {
      padding: 8px 16px; border-radius: 8px; border: none; font-weight: 700; font-size: 12px; cursor: pointer; transition: 0.2s;
    }
    .btn-approve { background: var(--success); color: white; }
    .btn-revoke { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn-action:hover { opacity: 0.8; transform: scale(1.05); }

    .loading { text-align: center; padding: 40px; color: var(--text-dim); }

    @media (max-width: 600px) {
      .license-card { flex-direction: column; align-items: flex-start; gap: 15px; }
      .actions { width: 100%; }
      .btn-action { flex: 1; }
    }
  </style>
</head>
<body>

  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-icon">⚙️</div>
      <div class="auth-title">Master Access</div>
      <div class="auth-desc">Enter your Master Key to manage licenses</div>
      <input type="password" id="master-key" placeholder="Enter Master Key" autofocus>
      <button class="btn-primary" onclick="login()">Login to Control Panel</button>
      <div id="auth-error" style="color: var(--danger); font-size: 12px; margin-top: 12px; display: none;">Invalid Master Key</div>
    </div>
  </div>

  <div id="app">
    <header>
      <div class="brand">
        <div class="logo-circle">M</div>
        <div class="brand-text">
          <h1>IVA MASTER</h1>
          <p>Control Dashboard</p>
        </div>
      </div>
      <button class="btn-revoke" style="padding: 6px 12px; font-size: 11px;" onclick="logout()">Logout</button>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Installs</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Shops</div>
        <div class="stat-value" id="stat-active" style="color: var(--success);">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending Approval</div>
        <div class="stat-value" id="stat-pending" style="color: #f59e0b;">0</div>
      </div>
    </div>

    <div class="controls">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Search by Shop Name or Machine ID..." oninput="renderLicenses()">
      </div>
      <button class="btn-primary" style="width: auto; padding-inline: 20px;" onclick="fetchLicenses()">Refresh</button>
    </div>

    <div id="license-list-el" class="license-list">
      <div class="loading">Fetching licenses from Supabase...</div>
    </div>
  </div>

  <script>
    let licenses = [];
    let masterKey = localStorage.getItem('iva_master_key');

    if (masterKey) showDashboard();

    function login() {
      const key = document.getElementById('master-key').value.trim();
      if (!key) return;
      verifyAndLogin(key);
    }

    async function verifyAndLogin(key) {
      try {
        const res = await fetch('/api/master/licenses', {
          headers: { 'Authorization': key }
        });
        if (res.ok) {
          masterKey = key;
          localStorage.setItem('iva_master_key', key);
          showDashboard();
        } else {
          document.getElementById('auth-error').style.display = 'block';
        }
      } catch(e) { alert('Connection error'); }
    }

    function logout() {
      localStorage.removeItem('iva_master_key');
      window.location.reload();
    }

    function showDashboard() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      fetchLicenses();
    }

    async function fetchLicenses() {
      const listEl = document.getElementById('license-list-el');
      try {
        const res = await fetch('/api/master/licenses', {
          headers: { 'Authorization': masterKey }
        });
        if (!res.ok) throw new Error();
        licenses = await res.json();
        renderLicenses();
        updateStats();
      } catch(e) {
        listEl.innerHTML = '<div class="loading" style="color: var(--danger);">Failed to load licenses. Session might be expired.</div>';
      }
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = licenses.length;
      document.getElementById('stat-active').textContent = licenses.filter(l => l.is_active).length;
      document.getElementById('stat-pending').textContent = licenses.filter(l => !l.is_active).length;
    }

    function renderLicenses() {
      const listEl = document.getElementById('license-list-el');
      const searchTerm = document.getElementById('search').value.toLowerCase();
      
      const filtered = licenses.filter(l => 
        (l.shop_name || '').toLowerCase().includes(searchTerm) || 
        (l.machine_id || '').toLowerCase().includes(searchTerm)
      );

      if (filtered.length === 0) {
        listEl.innerHTML = '<div class="loading">No licenses found matching your search.</div>';
        return;
      }

      listEl.innerHTML = filtered.map(l => `
        <div class="license-card">
          <div class="info">
            <div class="shop-name">
              ${esc(l.shop_name || 'New Installation')}
              <span class="status-badge ${l.is_active ? 'status-active' : 'status-pending'}">
                ${l.is_active ? 'Active' : 'Pending'}
              </span>
            </div>
            <div class="hwid">${l.machine_id}</div>
            <div class="meta">Installed: ${new Date(l.created_at).toLocaleDateString()} · ${l.owner_details || 'No email provided'}</div>
          </div>
          <div class="actions">
            ${l.is_active ? 
              `<button class="btn-action btn-revoke" onclick="updateStatus('${l.id}', false)">Deactivate</button>` :
              `<button class="btn-action btn-approve" onclick="updateStatus('${l.id}', true)">Approve Shop</button>`
            }
          </div>
        </div>
      `).join('');
    }

    async function updateStatus(id, status) {
      if (!confirm(`Are you sure you want to ${status ? 'APPROVE' : 'DEACTIVATE'} this machine?`)) return;
      
      try {
        const res = await fetch(`/api/master/licenses/${id}/status`, {
          method: 'POST',
          headers: { 
            'Authorization': masterKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ status })
        });
        
        if (res.ok) {
          fetchLicenses();
        } else {
          alert('Failed to update status');
        }
      } catch(e) { alert('Network error'); }
    }

    function esc(str) {
      const p = document.createElement('p');
      p.textContent = str;
      return p.innerHTML;
    }

    document.getElementById('master-key').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
