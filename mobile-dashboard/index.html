<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>iVA Cloud Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- PWA & Native App Feel -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1055/1055644.png">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Geist', 'sans-serif'] },
          colors: {
            background: "hsl(240 10% 3.9%)",
            foreground: "hsl(0 0% 98%)",
            primary: "hsl(0 0% 98%)",
            card: "hsl(240 10% 4.5%)",
            border: "hsl(240 3.7% 15.9%)",
            muted: "hsl(240 3.7% 15.9%)",
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-foreground antialiased min-h-screen">

<!-- Connection Setup Overlay (Shown if settings missing) -->
<div id="setup-screen" class="fixed inset-0 z-[300] hidden bg-background px-6 flex flex-col items-center justify-center text-center">
  <div class="max-w-xs space-y-6">
    <h2 class="text-2xl font-bold">Cloud Connection</h2>
    <p class="text-sm text-gray-400">Please enter your Supabase credentials from the Desktop App Settings.</p>
    <div class="space-y-3 text-left">
      <input id="sub-url" placeholder="Supabase URL" class="w-full bg-muted border border-border p-3 rounded-lg text-sm">
      <input id="sub-key" placeholder="Supabase Anon Key" type="password" class="w-full bg-muted border border-border p-3 rounded-lg text-sm">
      <input id="sub-shop" placeholder="Shop ID" class="w-full bg-muted border border-border p-3 rounded-lg text-sm">
      <button onclick="saveSetup()" class="w-full bg-white text-black font-bold p-3 rounded-lg text-sm mt-4 uppercase">Connect Store</button>
    </div>
  </div>
</div>

<div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-background px-6">
  <div class="w-full max-w-sm space-y-8 text-center">
    <div class="space-y-2">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-xl bg-white text-black">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
      </div>
      <h1 class="text-2xl font-bold tracking-tight">Cloud Authorization</h1>
      <button onclick="showSetup()" class="text-[10px] text-gray-500 uppercase tracking-widest mt-2 underline">Change Connection</button>
    </div>
    <div class="space-y-4">
      <input id="master-key" type="password" placeholder="Master Access Key" class="w-full h-12 bg-muted border border-border rounded-lg px-4 text-center text-xl tracking-widest outline-none">
      <button onclick="login()" class="w-full h-12 bg-white text-black font-bold rounded-lg shadow hover:bg-gray-100 transition-colors">UNLOCK SECURE ACCESS</button>
    </div>
  </div>
</div>

<div id="app" class="hidden pb-24">
  <header class="sticky top-0 z-50 w-full border-b bg-background/95 backdrop-blur px-6 py-4 flex justify-between items-center">
    <span class="text-lg font-bold tracking-tight">iVA <span class="text-gray-500 font-medium italic">CLOUD</span></span>
    <div id="status" class="flex items-center gap-1.5 rounded-full bg-emerald-500/10 px-3 py-1 text-[10px] font-bold text-emerald-500">
      <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span> SYNCED
    </div>
  </header>

  <main class="p-6 space-y-6">
    <div class="space-y-1">
      <h2 class="text-3xl font-extrabold tracking-tight">Analytics</h2>
      <p id="time-label" class="text-xs text-gray-500 uppercase tracking-widest font-bold">Live Store Feed</p>
    </div>

    <!-- Metrics Grid -->
    <div class="grid grid-cols-2 gap-4">
      <div class="col-span-2 p-6 rounded-2xl border bg-card relative overflow-hidden">
        <p class="text-[10px] uppercase tracking-widest font-bold text-gray-500 mb-1">Today's Estimated Profit</p>
        <h3 id="m-profit" class="text-4xl font-black">₹0.00</h3>
        <div class="mt-4 flex gap-4 border-t border-border pt-4">
          <div>
            <p class="text-[9px] uppercase text-gray-500">Revenue</p>
            <p id="m-sales" class="text-sm font-bold">₹0</p>
          </div>
          <div>
            <p class="text-[9px] uppercase text-gray-500">Bills</p>
            <p id="m-bills" class="text-sm font-bold">0</p>
          </div>
        </div>
      </div>
    </div>

    <div class="p-5 rounded-2xl border bg-card">
      <h4 class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-4">Revenue Trend (Cloud)</h4>
      <div class="h-48 w-full">
         <canvas id="rev-chart"></canvas>
      </div>
    </div>

    <!-- Notifications Section -->
    <div class="space-y-4">
      <h4 class="text-xs font-bold uppercase tracking-widest text-gray-500">Stock & System Alerts</h4>
      <div id="notif-list" class="space-y-2">
        <!-- Notifs here -->
      </div>
    </div>
  </main>
</div>

<script>
  let supabase = null;
  let DB = { invoices: [], products: [], notifs: [] };
  let chart = null;

  function showSetup() { document.getElementById('setup-screen').classList.remove('hidden'); }
  function saveSetup() {
    localStorage.setItem('iva_sub_url', document.getElementById('sub-url').value);
    localStorage.setItem('iva_sub_key', document.getElementById('sub-key').value);
    localStorage.setItem('iva_sub_shop', document.getElementById('sub-shop').value);
    location.reload();
  }

  function init() {
    const params = new URLSearchParams(window.location.search);
    const pUrl = params.get('url');
    const pKey = params.get('key');
    const pShop = params.get('shop');

    if (pUrl && pKey && pShop) {
      localStorage.setItem('iva_sub_url', pUrl);
      localStorage.setItem('iva_sub_key', pKey);
      localStorage.setItem('iva_sub_shop', pShop);
    }

    const url = localStorage.getItem('iva_sub_url');
    const key = localStorage.getItem('iva_sub_key');
    if (!url || !key) { showSetup(); return; }
    supabase = supabase.createClient(url, key);
  }

  async function login() {
    // Basic master key check (in a real app, this would be a hash check or auth)
    // For now, we assume if they can reach the cloud with the key, they are authorized.
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    sync();
    setInterval(sync, 30000);
  }

  async function sync() {
    if (!supabase) return;
    const shopId = localStorage.getItem('iva_sub_shop');
    
    // Fetch Invoices
    const { data: invs } = await supabase.from('invoices').select('*').eq('shop_id', shopId).order('created_at', { ascending: false });
    // Fetch Notifs
    const { data: nts } = await supabase.from('notifications').select('*').eq('shop_id', shopId).order('created_at', { ascending: false }).limit(5);

    DB.invoices = invs || [];
    DB.notifs = nts || [];
    render();
  }

  function render() {
    const today = new Date().toISOString().split('T')[0];
    const todayBills = DB.invoices.filter(i => i.bill_date === today);
    const revenue = todayBills.reduce((acc, curr) => acc + curr.total_amount, 0);
    
    // Profit approximation (Sale - Cost from embedded products if available or just generic 20%)
    const profit = revenue * 0.2; 

    document.getElementById('m-sales').textContent = `₹${revenue.toLocaleString()}`;
    document.getElementById('m-bills').textContent = todayBills.length;
    document.getElementById('m-profit').textContent = `₹${profit.toLocaleString()}`;

    // Notifs
    document.getElementById('notif-list').innerHTML = DB.notifs.map(n => `
      <div class="p-4 rounded-xl border bg-muted/20 flex gap-3 items-center">
        <div class="h-2 w-2 rounded-full ${n.type === 'EXPIRY' ? 'bg-rose-500' : 'bg-amber-500'}"></div>
        <div class="flex-1">
          <p class="text-xs font-bold uppercase tracking-tight">${n.type}</p>
          <p class="text-[11px] text-gray-400">${n.message}</p>
        </div>
        <span class="text-[9px] text-gray-600">${new Date(n.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
      </div>
    `).join('') || '<p class="text-center py-4 text-xs text-gray-600">No alerts found</p>';

    updateChart();
  }

  function updateChart() {
    const ctx = document.getElementById('rev-chart').getContext('2d');
    if (chart) chart.destroy();
    
    const last7 = [...new Set(DB.invoices.map(i => i.bill_date))].sort().slice(-7);
    const data = last7.map(d => DB.invoices.filter(i => i.bill_date === d).reduce((a,c) => a+c.total_amount, 0));

    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: last7.map(d => new Date(d).toLocaleDateString('en-IN', {weekday:'short'})),
        datasets: [{
          data, borderColor: '#fff', tension: 0.4, fill: true, backgroundColor: 'rgba(255,255,255,0.05)', pointRadius: 0
        }]
      },
      options: { 
        responsive: true, maintainAspectRatio: false, plugins: { legend: { display:false } },
        scales: { x: { grid: { display:false }, ticks:{color:'#666', font:{size:9}} }, y: { grid: { color:'#222' }, ticks:{color:'#666', font:{size:9}} } }
      }
    });
  }

  init();
</script>
</body>
</html>
